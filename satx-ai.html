<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#04060c" />
  <title>SATX AI - Saturnx</title>
  <meta name="description" content="SATX AI — Premium engineering and procurement intelligence by SaturnX." />
  <meta property="og:title" content="Saturnx — SATX AI" />
  <meta property="og:description" content="From search to quotation in seconds with SATX AI." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="satx-ai-logo.png" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="satx-ai.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-W7QYB9BR2G"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-W7QYB9BR2G');
  </script>
</head>
<body id="top" class="satx-premium-page">
  <div class="satx-ambient" aria-hidden="true">
    <div class="satx-ambient__gradient"></div>
    <div class="satx-ambient__orb"></div>
    <div class="satx-ambient__grid"></div>
  </div>

  <header class="site-header satx-premium-header">
    <div class="container header-row">
      <a class="brand" href="index.html" aria-label="Saturnx Home">
        <img class="brand-logo" src="logo.png" alt="Saturnx logo" />
      </a>
      <nav class="nav">
        <div class="nav-sections">
          <a class="nav-pill" href="index.html">HOME</a>
          <a class="nav-pill" href="itservices.html">IT SERVICES</a>
          <a class="nav-pill" href="engineering.html">ENGINEERING SERVICES</a>
          <a class="nav-pill nav-pill--active" href="satx-ai.html" aria-current="page">SATX AI</a>
          <a class="nav-pill" href="itservices.html#contact">CONTACT</a>
        </div>
      </nav>
    </div>
  </header>

  <main class="satx-app" id="satx-app" aria-label="SATX AI">
    <div class="satx-hero-logo" id="satx-hero-logo" aria-hidden="true">
      <div class="satx-hero-logo__halo"></div>
      <div class="satx-hero-logo__ring"></div>
      <img src="satx-ai-logo.png" alt="" class="satx-hero-logo__img" width="320" height="80" />
      <p class="satx-hero-logo__caption">Engineering &amp; Procurement Intelligence</p>
    </div>

    <div class="satx-sidebar-overlay" id="satx-sidebar-overlay" aria-hidden="true"></div>

    <aside class="satx-sidebar" id="satx-sidebar" aria-label="Domains">
      <button type="button" class="satx-sidebar__close" id="satx-sidebar-close" aria-label="Close menu">
        <i class="fas fa-times" aria-hidden="true"></i>
      </button>
      <button type="button" class="satx-sidebar__new" id="satx-new-chat">
        <i class="fas fa-plus" aria-hidden="true"></i> New session
      </button>
      <p class="satx-sidebar__label">Domains</p>
      <nav class="satx-sidebar__nav">
        <button type="button" class="satx-sidebar__item" data-satx-prompt="Cisco 48 Port PoE Switch">
          <i class="fas fa-network-wired" aria-hidden="true"></i> IT &amp; Networking
        </button>
        <button type="button" class="satx-sidebar__item" data-satx-prompt="2 Inch SS Ball Valve 2000 LBS">
          <i class="fas fa-industry" aria-hidden="true"></i> Industrial
        </button>
        <button type="button" class="satx-sidebar__item" data-satx-prompt="Hotel CCTV System">
          <i class="fas fa-video" aria-hidden="true"></i> ELV &amp; CCTV
        </button>
        <button type="button" class="satx-sidebar__item" data-satx-prompt="CAT6A Cable">
          <i class="fas fa-bolt" aria-hidden="true"></i> Electrical
        </button>
        <button type="button" class="satx-sidebar__item" data-satx-prompt="UPS 10kVA">
          <i class="fas fa-car-battery" aria-hidden="true"></i> UPS &amp; Power
        </button>
        <button type="button" class="satx-sidebar__item" data-satx-prompt="Fire alarm system for commercial building">
          <i class="fas fa-fire-extinguisher" aria-hidden="true"></i> Fire &amp; Safety
        </button>
      </nav>
    </aside>

    <section class="satx-stage">
      <header class="satx-stage__bar">
        <button type="button" class="satx-stage__icon" id="satx-sidebar-open" aria-label="Open domains">
          <i class="fas fa-layer-group" aria-hidden="true"></i>
        </button>
        <span class="satx-stage__status"><span class="satx-stage__dot"></span> Online</span>
        <button type="button" class="satx-stage__icon" id="satx-new-chat-top" aria-label="New session">
          <i class="fas fa-rotate-left" aria-hidden="true"></i>
        </button>
      </header>

      <div class="satx-stage__scroll" id="satx-scroll">
        <div class="satx-thread" id="satx-messages" aria-live="polite" aria-label="Chat messages"></div>
      </div>

      <div class="satx-dock" id="satx-dock">
        <div class="satx-chips" id="satx-prompts" aria-label="Suggested prompts"></div>
        <div class="satx-composer">
          <div class="satx-composer__glass">
            <input
              id="satx-input"
              class="satx-composer__input"
              type="text"
              placeholder="Ask SATX AI about materials, specs, or quotations..."
              autocomplete="off"
              aria-label="Message SATX AI"
            />
            <button id="satx-send" class="satx-composer__send" type="button" aria-label="Send" disabled>
              <i class="fas fa-arrow-up" aria-hidden="true"></i>
            </button>
          </div>
        </div>
        <p class="satx-dock__note">Specs &amp; RFQs only · Official pricing from SaturnX sales</p>
      </div>
    </section>
  </main>

  <script src="mobile-menu.js"></script>
  <script src="satx-ai.js"></script>
</body>
</html>
